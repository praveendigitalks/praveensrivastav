<!-- home.component.html -->
<!-- ======= Header ======= -->
<header id="header">
  <div class="container">

    <!-- 👤 Tenant / Default Name -->
    <h1>
      <a href="#">
        {{ isLogin && tenantName ? tenantName : 'Praveen Srivastav' }}
      </a>
    </h1>

    <!-- 👇 When logged in: show static intro + animated roles from tenant bio -->
    <!-- 👇 When NOT logged in: show default intro + default animated roles -->
    <h2>
      An Enthusiastic Engineer who works as
      <span #roleText></span>
    </h2>

    <!-- navbar -->
    <nav id="navbar" class="navbar" [class.navbar-mobile]="isMobileOpen">
      <ul>
        <li><a class="nav-link" routerLink="/" (click)="closeMenu()">Home</a></li>
        <li><a class="nav-link" routerLink="/about" (click)="closeMenu()">About</a></li>
        <li><a class="nav-link" routerLink="/resume" (click)="closeMenu()">Resume</a></li>
        <li><a class="nav-link" routerLink="/portfolio" (click)="closeMenu()">Portfolio</a></li>
        <li><a class="nav-link" routerLink="/contact" (click)="closeMenu()">Contact</a></li>
      </ul>

      <i
        class="fa-solid mobile-nav-toggle"
        [class.fa-bars]="!isMobileOpen"
        [class.fa-xmark]="isMobileOpen"
        (click)="toggleMenu()"
      ></i>
    </nav>
    <!-- navbar end -->

    <div class="social-links">
      <a href="https://github.com/praveensrivastav3j" class="github"
        ><i class="fa-brands fa-github"></i
      ></a>
      <a href="mailto:praveensrivatav3july@zohomail.in" class="mail"
        ><i class="fa-solid fa-envelope"></i
      ></a>
      <a
        href="https://www.linkedin.com/in/srivastav-praveen-754846160/"
        class="linkedin"
        ><i class="fa-brands fa-linkedin"></i
      ></a>
    </div>

    <!-- Login link only when NOT logged in -->
    <p class="my-4" *ngIf="!isLogin">
      <u></u><a href="/login"> Are you Admin ?</a>
    </p>
  </div>
</header>
<!-- End Header -->
