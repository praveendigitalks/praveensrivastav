<!-- ======= Tenant Section ======= -->
<div id="contact" class="contact section-show">

  <div class="superadmin-container">
    <div class="section-title">
      <h2 routerLink="/superadmin/tenant">Tenant List</h2>
      <p>Add Tenant</p>
    </div>


    <form (ngSubmit)="OnSubmit()" [formGroup]="tenantForm" class="php-email-form mt-4">
      <div class="col-lg-4" data-aos="fade-right">
        <div class="profile-upload-circle" (click)="triggerFileInput()" (dragover)="onDragOver($event)"
          (drop)="onDrop($event)" [class.has-image]="selectedFile || previewUrl">

          <input type="file" #fileInput id="fileInput" (change)="onFileSelected($event)" hidden accept="image/*">

          <img [src]="previewUrl || '/favicon.jpeg'" class="preview-image" alt="" *ngIf="selectedFile || previewUrl">

          <div class="no-image-content" *ngIf="!selectedFile && !previewUrl">
            <i class="fas fa-plus-circle fa-5x"></i>
            <!-- <p>Click or Drop Image</p> -->
            <p>Upload darker image for the best visibility</p>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 form-group">
          <input type="text" name="tenantName" class="form-control" formControlName="tenantName" id="tenantName"
            placeholder="tenantName" required>
        </div>
        <div class="col-md-6 form-group">
          <input type="text" class="form-control" name="tenantPhoneNo" id="tenantPhoneNo" placeholder="tenantPhoneNo"
            formControlName="tenantPhoneNo" required>
        </div>
        <div class="col-md-6 form-group mt-3">
          <input type="email" class="form-control" name="email" id="email" placeholder="email" formControlName="email"
            required>
        </div>
        <div class="col-md-6 form-group mt-3">
          <input type="text" class="form-control" name="bio" id="bio" placeholder="bio" formControlName="bio" required>
        </div>
      </div>



      <div class="text-center my-3">

        <button type="button" class="btn-cancel me-3" (click)="resetForm()">Cancel</button>

        <button type="submit" class="btn-create" [disabled]="tenantForm.invalid || isSubmitting">

          <span *ngIf="isSubmitting" class="spinner"></span>

          Create Tenant

        </button>

      </div>
    </form>

  </div>



</div><!-- End Contact Section -->
